name: Update writing from Substack

on:
  schedule:
    - cron: "0 12 * * *"   # daily at 12:00 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-writing
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Substack feed (curl's TLS fingerprint passes Cloudflare)
        run: |
          curl -sS --fail --retry 4 --retry-delay 3 --retry-all-errors --compressed \
            -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: application/rss+xml, application/xml;q=0.9, */*;q=0.5" \
            -H "Accept-Language: en-US,en;q=0.9" \
            "https://hazemhasan.substack.com/feed" -o feed.xml
          echo "fetched $(wc -c < feed.xml) bytes"

      - name: Regenerate writing list from the feed
        run: python3 scripts/update_writing.py feed.xml

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto-update writing list from Substack"
            git push
            echo "Pushed updated writing list."
          else
            echo "No changes to commit."
          fi
